<div class="post-layout">
  {{ tableOfContents }}
  <article class="article">
    <header class="article-header">
      <h1>{{ title }}</h1>
      <div class="post-meta">
        <time datetime="{{ dateISO }}">{{ dateText }}</time>
        <span>{{ readingTime }}</span>
        {{ categories }}
        {{ tags }}
      </div>
    </header>
    <div class="markdown-body">
      {{ content }}
    </div>
  </article>
  {{ relatedPosts }}
</div>
