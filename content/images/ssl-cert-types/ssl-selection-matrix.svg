<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" role="img" aria-labelledby="title desc">
  <title id="title">SSL certificate selection matrix</title>
  <desc id="desc">A selection chart mapping website scenarios to recommended SSL certificate types.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fbfd"/>
      <stop offset="100%" stop-color="#edf3fb"/>
    </linearGradient>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1e2944; }
      .h1 { font-size: 50px; font-weight: 700; }
      .sub { font-size: 25px; fill: #58637e; }
      .head { font-size: 26px; font-weight: 700; fill: #ffffff; }
      .body { font-size: 24px; }
      .small { font-size: 22px; fill: #46536f; }
      .tag { font-size: 22px; font-weight: 700; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1500" height="940" fill="url(#bg)"/>
  <text x="100" y="95" class="h1">2026 年常见场景怎么选 SSL 证书</text>
  <text x="100" y="140" class="sub">按业务风险和身份展示需求来选，别按“最贵=最安全”这个误区来选。</text>

  <rect x="100" y="210" width="480" height="90" rx="22" fill="#20304f"/>
  <rect x="580" y="210" width="300" height="90" rx="22" fill="#20304f"/>
  <rect x="880" y="210" width="520" height="90" rx="22" fill="#20304f"/>
  <text x="135" y="267" class="head">业务场景</text>
  <text x="615" y="267" class="head">推荐证书</text>
  <text x="915" y="267" class="head">原因</text>

  <g>
    <rect x="100" y="320" width="1300" height="108" rx="24" fill="#ffffff"/>
    <text x="135" y="385" class="body">个人博客 / 文档站 / 产品落地页</text>
    <rect x="620" y="345" width="150" height="54" rx="18" fill="#2ea36a"/>
    <text x="675" y="380" class="tag">免费 DV</text>
    <text x="915" y="385" class="small">有 HTTPS 即可，身份展示诉求低，自动续期成本最低。</text>
  </g>

  <g>
    <rect x="100" y="448" width="1300" height="108" rx="24" fill="#ffffff"/>
    <text x="135" y="513" class="body">创业团队官网 / SaaS 管理后台</text>
    <rect x="620" y="473" width="150" height="54" rx="18" fill="#d28a00"/>
    <text x="692" y="508" class="tag">DV / OV</text>
    <text x="915" y="513" class="small">若强调品牌真实性或商务信任，OV 会更稳；否则 DV 已够用。</text>
  </g>

  <g>
    <rect x="100" y="576" width="1300" height="108" rx="24" fill="#ffffff"/>
    <text x="135" y="641" class="body">企业官网 / B2B 平台 / 电商业务</text>
    <rect x="635" y="601" width="120" height="54" rx="18" fill="#c88400"/>
    <text x="677" y="636" class="tag">OV</text>
    <text x="915" y="641" class="small">要明确告诉访客“这是真实企业”，人工审核带来的背书更有价值。</text>
  </g>

  <g>
    <rect x="100" y="704" width="1300" height="108" rx="24" fill="#ffffff"/>
    <text x="135" y="769" class="body">金融 / 支付 / 强合规交易系统</text>
    <rect x="635" y="729" width="120" height="54" rx="18" fill="#d94b62"/>
    <text x="678" y="764" class="tag">EV</text>
    <text x="915" y="769" class="small">需要最高等级身份核验、审计解释性和更强的反钓鱼信任信号。</text>
  </g>

  <rect x="100" y="845" width="1300" height="52" rx="18" fill="#dfe8f7"/>
  <text x="130" y="879" class="small">通用原则：先看业务风险，再看访客是否需要看到“你是谁”，最后再考虑预算和运维复杂度。</text>
</svg>
