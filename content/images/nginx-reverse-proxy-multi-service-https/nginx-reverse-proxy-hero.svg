<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="920" viewBox="0 0 1480 920" role="img" aria-labelledby="title desc">
  <title id="title">Nginx reverse proxy multi-service architecture</title>
  <desc id="desc">A diagram showing users entering through HTTPS 443 to Nginx, which routes to frontend, API, blog, and Docker services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbfe"/>
      <stop offset="100%" stop-color="#e9f1f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#7084a2" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1b2740; }
      .h1 { font-size: 50px; font-weight: 700; }
      .sub { font-size: 25px; fill: #58637b; }
      .title { font-size: 30px; font-weight: 700; }
      .body { font-size: 22px; fill: #42506a; }
      .tag { font-size: 22px; font-weight: 700; fill: #ffffff; }
    </style>
  </defs>
  <rect width="1480" height="920" fill="url(#bg)"/>
  <text x="100" y="95" class="h1">所有外部流量先进 Nginx，再分发给不同内部服务</text>
  <text x="100" y="140" class="sub">对用户只暴露一个域名和一个 HTTPS 入口，对服务器内部则保留多端口拆分。</text>

  <g filter="url(#shadow)">
    <rect x="120" y="300" width="250" height="170" rx="28" fill="#ffffff"/>
    <rect x="555" y="255" width="370" height="260" rx="32" fill="#20304f"/>
    <rect x="1020" y="200" width="300" height="130" rx="28" fill="#ffffff"/>
    <rect x="1020" y="360" width="300" height="130" rx="28" fill="#ffffff"/>
    <rect x="1020" y="520" width="300" height="130" rx="28" fill="#ffffff"/>
    <rect x="1020" y="680" width="300" height="130" rx="28" fill="#ffffff"/>
  </g>

  <text x="180" y="375" class="title">用户浏览器</text>
  <text x="180" y="415" class="body">只访问 `https://example.com`</text>

  <rect x="665" y="300" width="145" height="40" rx="20" fill="#3b5d92"/>
  <text x="705" y="327" class="tag">443 / TLS</text>
  <text x="655" y="395" class="title" fill="#ffffff">Nginx 反向代理</text>
  <text x="620" y="440" class="body" fill="#d9e4f7">按 Host 或路径判断，把请求</text>
  <text x="620" y="475" class="body" fill="#d9e4f7">转给真正提供服务的内部端口。</text>

  <path d="M370 385 H555" stroke="#88a2cc" stroke-width="10" stroke-linecap="round"/>
  <path d="M925 380 H1020" stroke="#88a2cc" stroke-width="8" stroke-linecap="round"/>
  <path d="M925 435 C980 435, 980 425, 1020 425" stroke="#88a2cc" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M925 435 C980 435, 980 585, 1020 585" stroke="#88a2cc" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M925 435 C980 435, 980 745, 1020 745" stroke="#88a2cc" stroke-width="8" stroke-linecap="round" fill="none"/>

  <g>
    <text x="1060" y="250" class="title">前端应用</text>
    <text x="1060" y="288" class="body">`/` → `localhost:5173`</text>
  </g>
  <g>
    <text x="1060" y="410" class="title">后端 API</text>
    <text x="1060" y="448" class="body">`/api` → `localhost:3000`</text>
  </g>
  <g>
    <text x="1060" y="570" class="title">博客或静态站</text>
    <text x="1060" y="608" class="body">`/blog` → `localhost:8080`</text>
  </g>
  <g>
    <text x="1060" y="730" class="title">其他容器服务</text>
    <text x="1060" y="768" class="body">`app.example.com` → `localhost:9000`</text>
  </g>

  <rect x="100" y="835" width="1280" height="50" rx="18" fill="#dce6f5"/>
  <text x="135" y="868" class="body">关键点：外部端口可以统一，内部端口可以分散，证书和 HTTPS 策略也统一收口在 Nginx。</text>
</svg>
